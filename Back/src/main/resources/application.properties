server.port=${PORT:8080}

# H2 Database (desarrollo)
spring.datasource.url=jdbc:h2:file:./data/horizonte
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Telegram
telegram.bot.token=${TELEGRAM_BOT_TOKEN:TU_TOKEN_AQUI}
telegram.bot.chat-id=${TELEGRAM_CHAT_ID:}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

# Admin
admin.password=${ADMIN_PASSWORD:admin123}

# Email (SMTP) — Resend
spring.mail.host=${EMAIL_HOST:smtp.resend.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:resend}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.admin.email=${ADMIN_EMAIL:admin@horizonteinmobiliario.cl}
app.email.from=${EMAIL_FROM:fcuevas@horizonteinmobiliario.cl}
app.contact.emails=${CONTACT_EMAILS:fcuevas@horizonteinmobiliario.cl,ffigueroa@horizonteinmobiliario.cl}
