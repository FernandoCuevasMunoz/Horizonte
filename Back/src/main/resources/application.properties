server.port=${PORT:8080}

# H2 Database (desarrollo)
spring.datasource.url=jdbc:h2:file:./data/horizonte
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Telegram
telegram.bot.token=${TELEGRAM_BOT_TOKEN:TU_TOKEN_AQUI}
telegram.bot.chat-id=${TELEGRAM_CHAT_ID:}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

# Admin
admin.password=${ADMIN_PASSWORD:admin123}

# Email (Resend API)
resend.api.key=${RESEND_API_KEY:}
app.admin.email=${ADMIN_EMAIL:admin@horizonteinmobiliario.cl}
app.email.from=${EMAIL_FROM:fcuevas@horizonteinmobiliario.cl}
app.contact.emails=${CONTACT_EMAILS:fcuevas@horizonteinmobiliario.cl,ffigueroa@horizonteinmobiliario.cl}

# MercadoLibre
ml.app-id=${ML_APP_ID:}
ml.secret-key=${ML_SECRET_KEY:}
ml.redirect-uri=${ML_REDIRECT_URI:https://horizonte-6xew.onrender.com/api/ml/callback}
ml.site-id=${ML_SITE_ID:MLC}
ml.contact-name=${ML_CONTACT_NAME:Horizonte Inmobiliario}
ml.contact-phone=${ML_CONTACT_PHONE:}
ml.contact-email=${ML_CONTACT_EMAIL:horizonteinmobiliariocl@gmail.com}
