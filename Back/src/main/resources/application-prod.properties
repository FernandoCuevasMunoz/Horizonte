# ── Producción ──────────────────────────────────────────────────────────
# Activar con: --spring.profiles.active=prod

# ── PostgreSQL (Neon) ────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}?sslmode=require&prepareThreshold=0
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.minimum-idle=0

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 deshabilitado
spring.h2.console.enabled=false

# Admin password desde variable de entorno
admin.password=${ADMIN_PASSWORD}

# ── Email (Resend API) ─────────────────────────────────
resend.api.key=${RESEND_API_KEY}
app.admin.email=${ADMIN_EMAIL}
app.email.from=${EMAIL_FROM}
app.contact.emails=${CONTACT_EMAILS}

# Telegram (fallback vacío para que no falle si no está configurada)
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.chat-id=${TELEGRAM_CHAT_ID:}

# MercadoLibre
ml.app-id=${ML_APP_ID}
ml.secret-key=${ML_SECRET_KEY}
ml.redirect-uri=${ML_REDIRECT_URI:https://horizonte-6xew.onrender.com/api/ml/callback}
ml.site-id=${ML_SITE_ID:MLC}
ml.contact-name=${ML_CONTACT_NAME:Horizonte Inmobiliario}
ml.contact-phone=${ML_CONTACT_PHONE:}
ml.contact-email=${ML_CONTACT_EMAIL:horizonteinmobiliariocl@gmail.com}
